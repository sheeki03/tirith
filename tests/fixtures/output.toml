# ── OutputTerminalHyperlinkMismatch ──────────────────────────────────────

[[fixture]]
name = "osc8_visible_url_different_host"
min_milestone = 7
input = "Click \u001b]8;;https://evil.example\u001b\\github.com\u001b]8;;\u001b\\ now."
context = "exec"
expected_action = "block"
expected_rules = ["output_terminal_hyperlink_mismatch"]

[[fixture]]
name = "osc8_visible_prose_no_fire"
min_milestone = 7
input = "Read \u001b]8;;https://example.com/article/1\u001b\\the full article\u001b]8;;\u001b\\."
context = "exec"
expected_action = "allow"
expected_rules = []
forbidden_rules = ["output_terminal_hyperlink_mismatch"]

[[fixture]]
name = "osc8_same_host_no_fire"
