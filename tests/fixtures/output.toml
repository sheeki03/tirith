# Output-direction rule fixtures (M7 ch1)
#
# These fire from `engine::analyze_output`, NOT `engine::analyze`. The
# `engine::analyze` golden-fixture runner does NOT cover them — they are
# tested by the dedicated `test_output_fixtures` driver in golden_fixtures.rs
# which calls `engine::analyze_output` directly.
#
# Context field is left as "exec" (any value works — the test runner ignores
# it for output fixtures). raw_bytes is used where the escape sequence
# encoding matters; the `input` field is decoded UTF-8 for documentation.

# ── OutputOsc52ClipboardWrite ────────────────────────────────────────────

[[fixture]]
name = "osc52_clipboard_write_bel_term"
min_milestone = 7
input = "before\u001b]52;c;aGVsbG8=\u0007after"
context = "exec"
expected_action = "block"
expected_rules = ["output_osc52_clipboard_write"]

[[fixture]]
name = "osc52_clipboard_write_st_term"
min_milestone = 7
input = "x\u001b]52;c;dGVzdA==\u001b\\y"
context = "exec"
expected_action = "block"
expected_rules = ["output_osc52_clipboard_write"]

