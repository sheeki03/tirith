# Threat intelligence rule fixtures
#
# These fixtures test Phase A local-DB threat intelligence detection.
# They require TIRITH_THREATDB_PATH to point to tests/fixtures/test-threatdb.dat,
# which is set up automatically by the test_threatintel_fixtures() test.
#
# The test DB contains:
#   - npm/evil-package versions 1.0.0, 1.0.1 (Confirmed malicious)
#   - pypi/malware-pkg all versions (Confirmed, all_versions_malicious)
#   - npm/borderline-pkg version 2.0.0 (Medium confidence)
#   - IP 203.0.113.50 (Feodo C2)
#   - Typosquat: npm/reacct -> react
#   - Typosquat: pypi/reqeusts -> requests
#   - Popular: npm/react, npm/express, pypi/requests, pypi/flask

