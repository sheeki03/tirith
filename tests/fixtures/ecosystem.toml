# ── M6 ch6 — package reputation signals (7 fixtures, one per new rule) ──
#
# These rules are emitted by `package_risk`/`install_txn`/`ecosystem_scan`
# in response to registry-API signals or snapshot-store state — NOT by the
# static engine pipeline that `tirith check` fixtures exercise. The static
# tier-1 → tier-3 path the safeguard tests verify cannot synthesize these
# signals (they require either a fresh registry response, two recorded
# snapshots, an OSV cache row, or an online repo-URL verification), so the
# fixtures below pin the *negative* shape: an exec-context command that
# names the relevant package does NOT spuriously fire the new rule. The
# rules themselves are listed in EXTERNALLY_TRIGGERED_RULES in
# `crates/tirith-core/tests/golden_fixtures.rs` and exercised by unit
# tests in their respective modules:
#   - registry_history     — diff_two_snapshots
#   - osv_correlation       — for_package + parse_cvss3_base
#   - dep_confusion         — evaluate
#   - install_script_analysis — analyze_script_text
#   - repo_mismatch         — verify
#   - package_risk          — api_factors_*_adds_factor tests

[[fixture]]
name = "m6_ch6_package_not_found_static_path_does_not_fire"
min_milestone = 6
input = "npm install some-package-name"
context = "exec"
expected_action = "allow"
expected_rules = []

