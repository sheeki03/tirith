# ── Install-command rules (M3 chunk 1, item 4) ──────────────────────────
#
# ATTACK fixtures (rule fires) and BENIGN fixtures (rule does NOT fire).
# The benign fixtures prove a legitimate `apt install foo`, `brew install
# foo`, `kubectl apply -f ./local.yaml`, `terraform init`, etc. stays clean.

# repo_add_from_pipe — curl ... | sudo tee .../sources.list.d/...
[[fixture]]
name = "repo_add_curl_pipe_tee_sources_list"
min_milestone = 3
input = "curl -fsSL https://repo.example.com/setup.list | sudo tee /etc/apt/sources.list.d/vendor.list"
context = "exec"
expected_action = "block"
expected_rules = ["repo_add_from_pipe"]

[[fixture]]
name = "repo_add_wget_pipe_tee_no_sudo"
min_milestone = 3
input = "wget -qO- https://repo.example.com/r | tee /etc/apt/sources.list.d/x.list"
context = "exec"
expected_action = "block"
expected_rules = ["repo_add_from_pipe"]

[[fixture]]
name = "repo_add_curl_redirect_sources_list"
min_milestone = 3
input = "curl https://repo.example.com/r > /etc/apt/sources.list.d/x.list"
context = "exec"
expected_action = "block"
expected_rules = ["repo_add_from_pipe"]

# repo_add_from_pipe BENIGN — local file into tee is not a network-fetch
# attack, so `repo_add_from_pipe` must NOT fire. M8 ch4 introduced
# `sudo_tee_system_file`, which catches `… | sudo tee /etc/…` regardless
# of source (even local files become attacker-controllable if their
# content came from somewhere untrusted). The `forbidden_rules` entry
# pins that we still do NOT trip `repo_add_from_pipe` here — the rule
# being demonstrated has not regressed.
[[fixture]]
name = "repo_add_local_cat_into_tee_no_repo_add_rule"
min_milestone = 3
input = "cat ./vendor.list | sudo tee /etc/apt/sources.list.d/vendor.list"
context = "exec"
expected_action = "block"
expected_rules = ["sudo_tee_system_file"]
forbidden_rules = ["repo_add_from_pipe"]

