name: Threat DB Build

on:
  schedule:
    - cron: '15 4 * * *' # Daily 04:15 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-threatdb:
    runs-on: ubuntu-latest
    env:
      # github.run_id and github.run_attempt are GitHub-controlled numeric
      # values, safe to use in shell commands (not user-supplied).
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build compiler
        run: cargo build --release -p tirith --bin tirith-threatdb-compile

      # Fetch Phase A sources (parallel)
      - name: Fetch sources
        run: |
          git clone --depth 1 https://github.com/ossf/malicious-packages.git /tmp/ossf-mp &
          git clone --depth 1 https://github.com/DataDog/malicious-software-packages-dataset.git /tmp/dd-mp &
          curl -sSfL https://feodotracker.abuse.ch/downloads/ipblocklist.txt -o /tmp/feodo.txt &
          curl -sSfL https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json -o /tmp/cisa-kev.json &
          wait
          echo "Sources fetched successfully"

      # Bail early if signing key is not configured
      - name: Check signing key
        env:
          TIRITH_THREATDB_SIGNING_KEY: ${{ secrets.THREATDB_SIGNING_KEY }}
        run: |
          if [ -z "$TIRITH_THREATDB_SIGNING_KEY" ]; then
            echo "::error::THREATDB_SIGNING_KEY secret is not configured. Set it in repo Settings → Secrets → Actions."
            exit 1
          fi

      # Compile + sign
      - name: Compile threat database
        env:
          TIRITH_THREATDB_SIGNING_KEY: ${{ secrets.THREATDB_SIGNING_KEY }}
        run: |
          ./target/release/tirith-threatdb-compile \
            --ossf /tmp/ossf-mp \
            --datadog /tmp/dd-mp \
            --feodo /tmp/feodo.txt \
            --cisa-kev /tmp/cisa-kev.json \
            --sequence "${RUN_ID}" \
            --sign-key-env TIRITH_THREATDB_SIGNING_KEY \
            --output tirith-threatdb.dat

      # Generate + sign manifest for client discovery
      - name: Generate signed manifest
        env:
          TIRITH_THREATDB_SIGNING_KEY: ${{ secrets.THREATDB_SIGNING_KEY }}
        run: |
          SHA=$(sha256sum tirith-threatdb.dat | cut -d' ' -f1)
          SIZE=$(stat -c%s tirith-threatdb.dat)
          URL="https://github.com/sheeki03/tirith/releases/download/threatdb-${RUN_ID}-${RUN_ATTEMPT}/tirith-threatdb.dat"
          PAYLOAD="{\"sha256\":\"$SHA\",\"size\":$SIZE,\"url\":\"$URL\",\"version\":${RUN_ID}}"
          SIG=$(./target/release/tirith-threatdb-compile sign-payload \
            --payload "$PAYLOAD" --key-env TIRITH_THREATDB_SIGNING_KEY)
          cat > threatdb-manifest.json <<EEOF
          {"version":${RUN_ID},"sha256":"$SHA","size":$SIZE,"url":"$URL","signature":"$SIG"}
          EEOF

      # Publish DB as release
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: threatdb-${{ github.run_id }}-${{ github.run_attempt }}
          files: |
            tirith-threatdb.dat
            threatdb-manifest.json

      # Update manifest on main branch via PR (avoids direct push permission issues)
      - name: Update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="threatdb-manifest-${RUN_ID}-${RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git add threatdb-manifest.json
          git commit -m "chore: update threatdb manifest to v${RUN_ID}"
          git push -u origin "$BRANCH"
          gh pr create --title "chore: threatdb manifest v${RUN_ID}" \
            --body "Auto-generated by threatdb CI" --label bot
          gh pr merge --auto --squash || echo "::warning::Auto-merge failed. Manifest PR needs manual merge."
