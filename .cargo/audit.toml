[advisories]
# time 0.3.46 DoS via RFC 2822 stack exhaustion — fix (0.3.47) requires Rust 1.88,
# but our MSRV is 1.83. Not exploitable: lopdf (our only consumer) doesn't parse
# user-provided RFC 2822 date strings. Will resolve when MSRV is bumped.
#
# RUSTSEC-2026-0187: lopdf 0.34 stack-overflow DoS on deeply nested PDF objects
# (uncatchable SIGABRT). Fix (lopdf >=0.42) needs Rust 1.85 > MSRV 1.83. The crash
# path is preflight-blocked by the nesting-depth guard in check_pdf (rules/rendered.rs)
# before load_mem runs. Keep in sync with deny.toml; remove when MSRV/lopdf move.
ignore = ["RUSTSEC-2026-0009", "RUSTSEC-2026-0187"]
