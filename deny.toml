[advisories]
version = 2
ignore = [
    # time <0.3.47 DoS via RFC 2822 stack exhaustion. Fix (0.3.47) requires
    # Rust 1.88 which exceeds our MSRV 1.83. Transitive dep via lopdf/rust-s3;
    # tirith never parses user-controlled RFC 2822 dates.
    "RUSTSEC-2026-0009",
    # rustls-pemfile unmaintained — transitive dep of rust-s3 (license server).
    # No replacement available; rust-s3 hasn't migrated yet.
    "RUSTSEC-2025-0134",
    # rustls-webpki CRL distribution point matching — affects 0.101.7 via
    # rust-s3 → rustls 0.21. Transitive dep pinned by rust-s3; tirith does
    # not use CRL revocation checking. The 0.103.x copy is already updated.
    "RUSTSEC-2026-0049",
    # rustls-webpki name constraints with wildcard — transitive via rust-s3.
    # Transitive dep chain: rust-s3 → aws-creds → attohttpc → rustls → rustls-webpki.
    # tirith does not use name constraint validation; accepted as pre-existing
    # condition from upstream Cargo.lock state (commit 251e580).
    "RUSTSEC-2026-0097",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "AGPL-3.0-only",
]

[bans]
multiple-versions = "warn"
