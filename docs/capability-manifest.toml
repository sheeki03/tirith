# tirith capability manifest
#
# Single source of truth for the capability matrix in docs/capability-matrix.md.
# This file is versioned (manifest_version) and consumed by the
# `capability_matrix_is_in_sync` CI test in crates/tirith/tests/cli_integration.rs,
# which re-renders the matrix from this manifest and fails the build if
# docs/capability-matrix.md has drifted. Edit this file, then run
# `cargo test -p tirith capability_matrix_is_in_sync` to regenerate the matrix.
#
# Per command we record what tirith actually inspects on the surface that
# command governs, so a reader can tell at a glance whether a command sees the
# full artifact, a partial signal set, or nothing at all.
#
# Fields per [[command]]:
#   name            the invocation (group prefix omitted where obvious)
#   group           the --help category this command lists under
#   inspected       one of: full | partial | none
#                     full    = tirith inspects the bytes/structure it acts on
#                     partial = tirith inspects some signals but not the whole
#                               artifact (e.g. metadata only, name match only)
#                     none    = tirith does not inspect content here; the
#                               command reports, gates, or configures
#   coverage        plain-language "why": what is inspected, or why not
#   policy_complete true when the active policy can fully govern this surface
#                   (allowlist/blocklist/severity/profile reach every decision
#                   the command makes); false when policy covers only part

manifest_version = 1

# ---------------------------------------------------------------------------
# Scan & analyze
# ---------------------------------------------------------------------------

[[command]]
name = "check"
group = "Scan & analyze"
inspected = "full"
coverage = "Tokenizes the command and inspects every extracted URL, path, and Docker ref through the full rule pipeline."
policy_complete = true

