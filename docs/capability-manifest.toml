group = "Scan & analyze"
inspected = "full"
coverage = "Re-analyzes the command being rewritten so the suggested safer form is itself checked."
policy_complete = true

[[command]]
name = "view"
group = "Scan & analyze"
inspected = "full"
coverage = "Neutralizes terminal-deception escape sequences in the rendered bytes before they reach the terminal."
policy_complete = true

[[command]]
name = "score"
group = "Scan & analyze"
inspected = "full"
coverage = "Decomposes a URL into fixed, inspectable trust factors that sum to the final score."
policy_complete = true

[[command]]
name = "diff"
group = "Scan & analyze"
inspected = "full"
coverage = "Byte-level inspection of where suspicious characters hide in a URL versus a known-good pattern."
policy_complete = true

[[command]]
name = "fetch"
group = "Scan & analyze"
inspected = "full"
coverage = "Fetches and inspects server responses for cloaking; --save quarantines without executing and marks the file tainted (Unix)."
policy_complete = true

[[command]]
